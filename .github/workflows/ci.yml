name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22+ is required: @supabase/realtime-js (a supabase-js dependency) eagerly
          # constructs a WebSocket client inside createClient() and throws synchronously on
          # Node < 22 with no native WebSocket global ("Node.js 20 detected without native
          # WebSocket support"). Every API route test that calls createClient() hits this.
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
